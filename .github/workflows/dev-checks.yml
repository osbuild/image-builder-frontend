name: Development checks

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  merge_group:

concurrency:
  group: ${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js with cached dependencies
      uses: ./.github/actions/setup-node-cached
    - name: Run build
      run: npm run build

  format-check:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js with cached dependencies
      uses: ./.github/actions/setup-node-cached
    - name: Check formatting
      run: npm run format:check

  lint-checks:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js with cached dependencies
      uses: ./.github/actions/setup-node-cached
    - name: Run lint check
      run: npm run lint

  circular-dependencies:
    name: Circular Dependencies Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js with cached dependencies
      uses: ./.github/actions/setup-node-cached
    - name: Check for circular dependencies
      run: npm run circular

  api-changes:
    name: Manual API Changes Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js with cached dependencies
      uses: ./.github/actions/setup-node-cached
    - name: Check for manual changes to API
      run: |
        npm run api
        if [ -n "$(git status --porcelain)" ]; then
          echo
          echo "✗ API manually changed, please refer to the README for the procedure to follow for programmatically generated API endpoints."
          exit 1
        else
          echo
          echo "✓ No manual API changes."
          exit 0
        fi

  pinned-versions:
    name: Pinned Dependencies Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check for unpinned dependencies
      run: |
        UNPINNED=$(grep -F '": "^' package.json || true)
        if [ -n "$UNPINNED" ]; then
          echo
          echo "✗ Found unpinned dependencies (using '^' prefix):"
          echo "$UNPINNED"
          echo
          echo "Pin versions for reproducible builds and explicit Dependabot PRs."
          echo "With '^', updates happen silently during npm install."
          exit 1
        else
          echo
          echo "✓ All dependencies are pinned."
          exit 0
        fi
