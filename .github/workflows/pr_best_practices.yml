name: "Verify PR best practices"

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  issue_comment:
    types: [created]
  merge_group:
  issues:
    types: [opened]

jobs:
  pr-best-practices:
    runs-on: ubuntu-latest
    steps:
      - name: PR best practice check
        uses: osbuild/pr-best-practices@main
        with:
          token: ${{ secrets.SCHUTZBOT_GITHUB_ACCESS_TOKEN }}
          jira_token: ${{ secrets.IMAGE_BUILDER_BOT_JIRA_API_TOKEN }}
          jira_email: ${{ secrets.IMAGE_BUILDER_BOT_JIRA_EMAIL }}
          new_issues_jira_epic: HMS-10978
